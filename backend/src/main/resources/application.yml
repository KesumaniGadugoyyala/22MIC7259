server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/campus_notifications}
    username: ${DB_USER:campus}
    password: ${DB_PASSWORD:campus}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.affordmed: INFO

app:
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:60}
    refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:60}
  priority-inbox:
    max-size: ${PRIORITY_INBOX_MAX_SIZE:10}
    sample-size: ${PRIORITY_INBOX_SAMPLE_SIZE:200}
  security:
    mock-jwt:
      enabled: ${MOCK_JWT_ENABLED:true}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:30}
  websocket:
    endpoint: ${WS_ENDPOINT:/ws}
    topic-prefix: ${WS_TOPIC_PREFIX:/topic}
  queue:
    enabled: ${QUEUE_ENABLED:true}
    notification-exchange: ${NOTIFICATION_EXCHANGE:notifications.exchange}
    notification-queue: ${NOTIFICATION_QUEUE:notifications.queue}
    notification-routing-key: ${NOTIFICATION_ROUTING_KEY:notifications.bulk}
    notification-dlq: ${NOTIFICATION_DLQ:notifications.dlq}
    notification-dlq-routing-key: ${NOTIFICATION_DLQ_ROUTING_KEY:notifications.dead}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
